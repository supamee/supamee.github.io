<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Add Elliott Twilley to Contacts</title>
  <meta name="description" content="Contact information for Elliott Twilley, founder of Grackle Consulting." />

  <style>
    :root {
      --bg: #000000;
      --panel: #111018;
      --text: #eeeaf7;
      --muted: #aaa1c4;
      --accent: #9b65b5;
      --border: #2b2540;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--accent);
      font-weight: 700;
    }

    .contact-list {
      text-align: left;
      margin: 24px 0;
      padding: 0;
      list-style: none;
    }

    .contact-list li {
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .contact-list li:last-child {
      border-bottom: 1px solid var(--border);
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2px;
    }

    a {
      color: var(--text);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .button {
      display: inline-block;
      appearance: none;
      border: 0;
      background: var(--accent);
      color: #000000;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.08s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: #b079cc;
      color: #000000;
      text-decoration: none;
    }

    .note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .home-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      font-size: 0.9rem;
    }
  </style>
</head>
<link rel="icon" type="image/png" href="images/turbine.svg" />
<body>
  <main class="card">
    <h1>Elliott Twilley</h1>
    <p class="subtitle">ML Engineer - TurbineOne</p>

    <ul class="contact-list">
      <li>
        <span class="label">Email</span>
        <a href="mailto:ETwilley@turbineone.com">ETwilley@turbineone.com</a>
      </li>

      <li>
        <span class="label">Phone</span>
        <a href="tel:+12079290217">207.929.0217</a>
      </li>

      <li>
        <span class="label">Location</span>
        Austin, Texas
      </li>

      
    </ul>

    <button id="downloadLink" type="button" class="button">
      Download Contact Card
    </button>
  </main>

  <script>
    const vcardLines = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:Twilley;Elliott;;;",
      "FN:Elliott Twilley",
      "ORG:TurbineOne",
      "TITLE:ML Engineer",
      "EMAIL;TYPE=INTERNET,WORK:ETwilley@turbineone.com",
      "TEL;TYPE=CELL:+12079290217",
      "ADR;TYPE=WORK:;;Austin;TX;;;USA",
      "URL:https://www.linkedin.com/in/Elliott-Twilley",
      "END:VCARD"
    ];

    function downloadContact() {
      const vcard = vcardLines.join("\r\n");
      const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "Elliott_Twilley.vcf";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    document.getElementById("downloadLink").addEventListener("click", downloadContact);

    window.addEventListener("load", () => {
      setTimeout(downloadContact, 500);
    });
  </script>
</body>
</html>
